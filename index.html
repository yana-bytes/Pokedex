<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokédex </title>
  <!--
    Google Fonts:
    "Press Start 2P" = retro pixel font (for headings, titles)
    "Nunito"         = for body text
  -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
 
  <style>
 
/* ------------------------------------------------
   CSS VARIABLES 
------------------------------------------------ */
:root {
  --red:       #cc0000;
  --red-dark:  #aa0000;
  --dark:      #1a1a2e;
  --darker:    #0f0f1a;
  --card-bg:   #16213e;
  --card2:     #0d1b35;
  --accent:    #ffd700;
  --accent2:   #ffaa00;
  --text:      #e8eaf0;
  --muted:     #7a8599;
  --white:     #ffffff;
  --radius:    14px;
  --shadow:    0 8px 32px rgba(0,0,0,0.5);
}
 
/* ------------------------------------------------
   RESET 
------------------------------------------------ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
 
/* ------------------------------------------------
   BODY
------------------------------------------------ */
body {
  background-color: var(--darker);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  overflow-x: hidden;
}
 
.hidden { display: none !important; }

/* Intro screen */
#intro-screen {
  position: fixed;
  inset: 0;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  background-image: repeating-linear-gradient(
    -45deg,
    rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 10px,
    transparent 10px, transparent 20px
  );
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#intro-screen.fade-out {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}
.intro-content { text-align: center; padding: 32px; }

/* Pokéball */
.pixel-pokeball {
  width: 120px; height: 120px;
  margin: 0 auto 28px;
  border-radius: 50%;
  overflow: hidden;
  border: 6px solid white;
  box-shadow: 0 0 40px rgba(255,255,255,0.4);
  position: relative;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-12px); }
}
.pb-top    { background: #fff; height: 50px; }
.pb-bottom { background: var(--dark); height: 50px; }
.pb-middle {
  position: absolute;
  top: 50%; left: 0; right: 0;
  transform: translateY(-50%);
  height: 14px; background: #fff;
  display: flex; align-items: center; justify-content: center;
}
.pb-button {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #fff;
  border: 4px solid #333;
  box-shadow: 0 0 0 4px #fff;
}

/* Title text */
.intro-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(22px, 6vw, 42px);
  color: #fff;
  text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  letter-spacing: 2px;
  margin-bottom: 12px;
}
.intro-sub {
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  margin-bottom: 40px;
  font-weight: 600;
}

/* PRESS START button */
.press-start-btn {
  display: block;
  margin: 0 auto 20px;
  padding: 16px 36px;
  background: var(--accent);
  color: #111;
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 6px 0 #b8860b;
  transition: transform 0.1s, box-shadow 0.1s;
}
.press-start-btn:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #b8860b; }
.press-start-btn:active { transform: translateY(4px);  box-shadow: 0 2px 0 #b8860b; }

/* Blinking subtitle */
.blink-text {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Header */
#main-header {
  background-image: linear-gradient(to right, #cc0000, #aa0000);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.header-left { display: flex; align-items: center; gap: 12px; }

/* Mini Pokéball in header */
.small-pokeball {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(to bottom, #fff 50%, #111 50%);
  border: 3px solid #fff;
  position: relative;
  flex-shrink: 0;
}
.small-pokeball::after {
  content: '';
  position: absolute;
  inset: 0;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 10px; height: 10px;
  background: #fff;
  border: 2px solid #111;
  border-radius: 50%;
}
.header-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(10px, 3vw, 16px);
  color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}
.caught-badge {
  background: rgba(0,0,0,0.25);
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 800;
  font-size: 13px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 6px;
}
#caught-count { color: var(--accent); font-size: 15px; }

.oak-message {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 20px;
  background: var(--card-bg);
  border-bottom: 2px solid rgba(255,255,255,0.06);
}
.oak-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  object-fit: cover;
  flex-shrink: 0;
  background: #1a2a4a;
}
.oak-bubble {
  background: var(--dark);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 0 12px 12px 12px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text);
  flex: 1;
  position: relative;
}
.oak-bubble::before {
  content: '';
  position: absolute;
  left: -10px; top: 10px;
  border: 6px solid transparent;
  border-right-color: rgba(255,255,255,0.1);
}
#oak-text { line-height: 1.5; }

/* Battle flash */
.battle-flash {
  position: fixed;
  inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 9000;
}
.battle-flash.flash {
  animation: battleFlash 0.4s ease forwards;
}
@keyframes battleFlash {
  0%   { opacity: 0; }
  20%  { opacity: 0.8; }
  100% { opacity: 0; }
}

</style>

</head>
<body>

  <div id="intro-screen">
    <div class="intro-content">
      <div class="pixel-pokeball">
        <div class="pb-top"></div>
        <div class="pb-middle">
          <div class="pb-button"></div>
        </div>
        <div class="pb-bottom"></div>
      </div>
 
      <h1 class="intro-title">POKÉDEX</h1>
      <p class="intro-sub">Johanna's Pokemon Booklet</p>
      <button id="start-btn" class="press-start-btn">▶ PRESS START</button>
      <p class="blink-text">— The Digital Adventure —</p>
    </div>
  </div>

/* Main app */
<div id="app" class="hidden">

/* Sticky header */
  <header id="main-header">
    <div class="header-left">
      <div class="small-pokeball"></div>
      <span class="header-title">POKÉDEX</span>
    </div>
    <div class="header-right">
      <div class="caught-badge">
        <span>📖</span>
        <span id="caught-count">0</span> seen
      </div>
    </div>
  </header>

/* johannas message */
  <div class="oak-message" id="oak-message">
    <img
      class="oak-avatar"
      src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
      alt="Pikachu"
    />
    <div class="oak-bubble">
      <p id="oak-text">Welcome! This is your Pokédex. Search for a Pokémon by name or number!</p>
    </div>
  </div>

</div>

<div id="battle-flash" class="battle-flash"></div>

  <script src="app.js"></script>
</body>
</html>
