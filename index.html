<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokédex </title>
  <!--
    Google Fonts:
    "Press Start 2P" = retro pixel font (for headings, titles)
    "Nunito"         = for body text
  -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
 
  <style>
 
/* ------------------------------------------------
   CSS VARIABLES 
------------------------------------------------ */
:root {
  --red:       #cc0000;
  --red-dark:  #aa0000;
  --dark:      #1a1a2e;
  --darker:    #0f0f1a;
  --card-bg:   #16213e;
  --card2:     #0d1b35;
  --accent:    #ffd700;
  --accent2:   #ffaa00;
  --text:      #e8eaf0;
  --muted:     #7a8599;
  --white:     #ffffff;
  --radius:    14px;
  --shadow:    0 8px 32px rgba(0,0,0,0.5);
}
 
/* ------------------------------------------------
   RESET 
------------------------------------------------ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
 
/* ------------------------------------------------
   BODY
------------------------------------------------ */
body {
  background-color: var(--darker);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  overflow-x: hidden;
}
 
.hidden { display: none !important; }

/* Intro screen */
#intro-screen {
  position: fixed;
  inset: 0;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  background-image: repeating-linear-gradient(
    -45deg,
    rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 10px,
    transparent 10px, transparent 20px
  );
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#intro-screen.fade-out {
  opacity: 0;
  transform: scale(1.05);
  pointer-events: none;
}
.intro-content { text-align: center; padding: 32px; }

/* Pokéball */
.pixel-pokeball {
  width: 120px; height: 120px;
  margin: 0 auto 28px;
  border-radius: 50%;
  overflow: hidden;
  border: 6px solid white;
  box-shadow: 0 0 40px rgba(255,255,255,0.4);
  position: relative;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-12px); }
}
.pb-top    { background: #fff; height: 50px; }
.pb-bottom { background: var(--dark); height: 50px; }
.pb-middle {
  position: absolute;
  top: 50%; left: 0; right: 0;
  transform: translateY(-50%);
  height: 14px; background: #fff;
  display: flex; align-items: center; justify-content: center;
}
.pb-button {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #fff;
  border: 4px solid #333;
  box-shadow: 0 0 0 4px #fff;
}

/* Title text */
.intro-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(22px, 6vw, 42px);
  color: #fff;
  text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  letter-spacing: 2px;
  margin-bottom: 12px;
}
.intro-sub {
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  margin-bottom: 40px;
  font-weight: 600;
}

/* PRESS START button */
.press-start-btn {
  display: block;
  margin: 0 auto 20px;
  padding: 16px 36px;
  background: var(--accent);
  color: #111;
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 6px 0 #b8860b;
  transition: transform 0.1s, box-shadow 0.1s;
}
.press-start-btn:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #b8860b; }
.press-start-btn:active { transform: translateY(4px);  box-shadow: 0 2px 0 #b8860b; }

/* Blinking subtitle */
.blink-text {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

</style>

</head>
<body>

  <div id="intro-screen">
    <div class="intro-content">
      <div class="pixel-pokeball">
        <div class="pb-top"></div>
        <div class="pb-middle">
          <div class="pb-button"></div>
        </div>
        <div class="pb-bottom"></div>
      </div>
 
      <h1 class="intro-title">POKÉDEX</h1>
      <p class="intro-sub">Johanna's Pokemon Booklet</p>
      <button id="start-btn" class="press-start-btn">▶ PRESS START</button>
      <p class="blink-text">— The Digital Adventure —</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
